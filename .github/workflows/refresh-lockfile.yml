name: Refresh npm lockfile

on:
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  refresh:
    if: github.head_ref == 'ci/validate-actions'
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Check out validation branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Regenerate package-lock.json
        run: npm install --package-lock-only --legacy-peer-deps --ignore-scripts --no-audit --no-fund

      - name: Commit refreshed lockfile
        run: |
          if git diff --quiet -- package-lock.json; then
            echo "package-lock.json was already current"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add package-lock.json
          git commit -m "Refresh npm lockfile"
          git push origin HEAD:${{ github.head_ref }}
