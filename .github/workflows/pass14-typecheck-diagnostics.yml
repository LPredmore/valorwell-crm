name: Pass 14 Typecheck Diagnostics

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  diagnostics:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Capture application TypeScript diagnostics
        shell: bash
        run: |
          set +e
          npm run typecheck > typecheck-diagnostics.log 2>&1
          status=$?
          cat typecheck-diagnostics.log
          echo "TYPECHECK_EXIT=$status" >> "$GITHUB_ENV"
          exit 0
      - uses: actions/upload-artifact@v4
        with:
          name: pass14-typecheck-diagnostics
          path: typecheck-diagnostics.log
      - name: Fail when typecheck failed
        run: test "${TYPECHECK_EXIT}" = "0"
