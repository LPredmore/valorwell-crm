name: Pass 14 Typecheck Diagnostics

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  diagnostics:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - name: Capture install and TypeScript diagnostics
        shell: bash
        run: |
          set +e
          npm ci > npm-ci-diagnostics.log 2>&1
          install_status=$?
          if [ "$install_status" = "0" ]; then
            npm run typecheck > typecheck-diagnostics.log 2>&1
            typecheck_status=$?
          else
            printf 'Typecheck not run because npm ci failed.\n' > typecheck-diagnostics.log
            typecheck_status=99
          fi
          cat npm-ci-diagnostics.log
          cat typecheck-diagnostics.log
          echo "INSTALL_EXIT=$install_status" >> "$GITHUB_ENV"
          echo "TYPECHECK_EXIT=$typecheck_status" >> "$GITHUB_ENV"
          exit 0
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: pass14-typecheck-diagnostics
          path: |
            npm-ci-diagnostics.log
            typecheck-diagnostics.log
      - name: Fail when diagnostics failed
        run: test "${INSTALL_EXIT}" = "0" && test "${TYPECHECK_EXIT}" = "0"
