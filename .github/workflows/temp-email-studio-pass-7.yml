name: Temporary Email Studio Pass 7 patch

on:
  push:
    branches: [agent/email-studio-pass-7-relationship-campaigns]

permissions:
  contents: write

jobs:
  patch:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/email-studio-pass-7-relationship-campaigns
      - name: Apply Pass 7 bundle
        shell: bash
        run: |
          set -euo pipefail
          echo '' | base64 -d > /tmp/pass7.tgz
          mkdir -p /tmp/pass7
          tar -xzf /tmp/pass7.tgz -C /tmp/pass7
          mkdir -p src/features/email-studio/campaign src/components/crm/relationships supabase/functions/relationship-campaign-worker
          cp /tmp/pass7/RelationshipCampaignEmailStudioComposer.tsx src/features/email-studio/campaign/RelationshipCampaignEmailStudioComposer.tsx
          cp /tmp/pass7/campaign-index.ts src/features/email-studio/campaign/index.ts
          cp /tmp/pass7/published-relationship-campaign.ts src/features/email-studio/templates/published-relationship-campaign.ts
          cp /tmp/pass7/RelationshipCampaignEmailStepEditor.tsx src/components/crm/relationships/RelationshipCampaignEmailStepEditor.tsx
          cp /tmp/pass7/relationship-worker-email-content.ts supabase/functions/relationship-campaign-worker/email-content.ts
          cp /tmp/pass7/20260723223000_email_studio_relationship_campaign_integration.sql supabase/migrations/20260723223000_email_studio_relationship_campaign_integration.sql
          cp /tmp/pass7/email-studio-relationship-campaign.test.ts src/test/email-studio-relationship-campaign.test.ts
          cp /tmp/pass7/email-studio-pass-7-relationship-campaigns.md docs/email-studio-pass-7-relationship-campaigns.md
          python /tmp/pass7/apply_pass7.py
      - name: Commit Pass 7 implementation
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add src supabase docs
          git commit -m "Pass 7: integrate Email Studio with relationship campaigns"
          git push origin HEAD:agent/email-studio-pass-7-relationship-campaigns
