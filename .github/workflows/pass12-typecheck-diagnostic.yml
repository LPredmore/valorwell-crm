name: Pass 12 Typecheck Diagnostic
on:
  pull_request:
    branches: [main]
permissions:
  contents: read
jobs:
  diagnose:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci --legacy-peer-deps --no-audit --no-fund
      - name: Capture application typecheck
        shell: bash
        run: |
          set +e
          npx tsc --noEmit --pretty false --project tsconfig.app.json > pass12-tsc.log 2>&1
          status=$?
          set -e
          cat pass12-tsc.log
          exit "$status"
      - name: Upload diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pass12-tsc-diagnostics
          path: pass12-tsc.log
          if-no-files-found: error
          retention-days: 1
