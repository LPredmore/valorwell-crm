name: Application CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-gate:
    name: Required - type-check and build
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci --legacy-peer-deps --no-audit --no-fund

      - name: Type-check
        run: npx tsc --noEmit

      - name: Build
        run: npm run build

  quality-advisory:
    name: Advisory - lint and tests
    runs-on: ubuntu-latest
    timeout-minutes: 20
    continue-on-error: true

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci --legacy-peer-deps --no-audit --no-fund

      - name: Lint
        id: lint
        continue-on-error: true
        run: npm run lint

      - name: Test
        id: test
        continue-on-error: true
        run: npm test

      - name: Publish quality summary
        if: always()
        run: |
          {
            echo "## Advisory quality checks"
            echo "| Check | Result |"
            echo "|---|---|"
            echo "| Lint | ${{ steps.lint.outcome }} |"
            echo "| Test | ${{ steps.test.outcome }} |"
            echo ""
            echo "These checks are visible but temporarily non-blocking while existing repository debt is cleaned up."
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Flag lint debt
        if: always() && steps.lint.outcome != 'success'
        run: exit 1

      - name: Flag test debt
        if: always() && steps.test.outcome != 'success'
        run: exit 1
