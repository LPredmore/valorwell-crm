name: Application CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    name: Type-check, lint, test, and build
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci --legacy-peer-deps --no-audit --no-fund

      - name: Type-check
        id: typecheck
        continue-on-error: true
        run: npx tsc --noEmit

      - name: Lint
        id: lint
        continue-on-error: true
        run: npm run lint

      - name: Test
        id: test
        continue-on-error: true
        run: npm test

      - name: Build
        id: build
        continue-on-error: true
        run: npm run build

      - name: Publish validation summary
        if: always()
        run: |
          {
            echo "## Application CI"
            echo "| Check | Result |"
            echo "|---|---|"
            echo "| Type-check | ${{ steps.typecheck.outcome }} |"
            echo "| Lint | ${{ steps.lint.outcome }} |"
            echo "| Test | ${{ steps.test.outcome }} |"
            echo "| Build | ${{ steps.build.outcome }} |"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Require type-check
        if: always() && steps.typecheck.outcome != 'success'
        run: exit 1

      - name: Require lint
        if: always() && steps.lint.outcome != 'success'
        run: exit 1

      - name: Require tests
        if: always() && steps.test.outcome != 'success'
        run: exit 1

      - name: Require build
        if: always() && steps.build.outcome != 'success'
        run: exit 1
