name: Application CI
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true
jobs:
  verify:
    name: Required - lint, type-check, test, and build
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          persist-credentials: false
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - name: Install dependencies
        run: npm ci --legacy-peer-deps --no-audit --no-fund
      - name: Lint
        run: npx eslint src --max-warnings=0
      - name: Type-check application
        run: npx tsc --noEmit --project tsconfig.app.json
      - name: Type-check tooling
        run: npx tsc --noEmit --project tsconfig.node.json
      - name: Test
        shell: bash
        run: |
          set +e
          npm test > vitest.log 2>&1
          status=$?
          set -e
          if [ "$status" -ne 0 ]; then
            tail -n 160 vitest.log
            exit "$status"
          fi
          cat vitest.log
      - name: Build
        run: npm run build
