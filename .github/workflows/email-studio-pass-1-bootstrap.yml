name: Email Studio Pass 1 Bootstrap

on:
  push:
    branches:
      - agent/email-studio-pass-1-spike

permissions:
  contents: write

jobs:
  lockfile:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Check out branch
        uses: actions/checkout@v4
        with:
          ref: agent/email-studio-pass-1-spike
          fetch-depth: 0
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - name: Install React Email editor
        run: npm install @react-email/editor@1.6.10 --save --legacy-peer-deps --no-audit --no-fund
      - name: Commit dependency lock
        shell: bash
        run: |
          if git diff --quiet -- package.json package-lock.json; then
            echo "Dependency lock is already current."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add package.json package-lock.json
          git commit -m "Add React Email editor dependency"
          git push origin HEAD:agent/email-studio-pass-1-spike
